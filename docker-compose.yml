services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: occirank
      POSTGRES_PASSWORD: occirank
      POSTGRES_DB: occirank
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U occirank -d occirank"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://occirank:occirank@postgres:5432/occirank
    volumes:
      - crawl_data:/var/lib/occirank/crawls
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  crawl_data:
